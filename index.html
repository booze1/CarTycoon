<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>APEX SYNDICATE — Street Racing Tycoon</title>
<meta name="description" content="Build a street racing empire: buy and tune cars, win physics-driven drag races, hire a crew, sign sponsors, and spin the Fortune Machine. Free browser game, no install.">
<meta name="theme-color" content="#0a0f1a">
<meta property="og:title" content="Apex Syndicate — Street Racing Tycoon">
<meta property="og:description" content="Drag racing meets business empire. Tune, race, hire, expand.">
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='18' fill='%230a0f1a'/%3E%3Ctext x='50' y='68' font-size='52' text-anchor='middle' font-family='Arial Black' font-style='italic' font-weight='900' fill='%23ffb020'%3EA%3C/text%3E%3C/svg%3E">
<style>
:root{
  --bg:#0a0f1a; --bg2:#0f1626; --panel:#141d31; --panel2:#1a2540;
  --edge:#263453; --edge-hi:#3a4d78;
  --ink:#e9eefb; --ink-dim:#8b99b8; --ink-faint:#5a6885;
  --amber:#ffb020; --amber-deep:#e08900; --red:#ff4757; --green:#3ddc84;
  --cyan:#38d6e8; --purple:#b06bff;
  --gold-grad:linear-gradient(160deg,#ffd44d,#ff9a1f);
  --shadow:0 10px 30px rgba(0,0,0,.45); --r:12px;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{height:100%}
body{
  background:
    radial-gradient(1200px 500px at 70% -10%, rgba(56,214,232,.06), transparent 60%),
    radial-gradient(900px 500px at 10% 110%, rgba(255,176,32,.05), transparent 60%),
    var(--bg);
  color:var(--ink);
  font-family:"Segoe UI",system-ui,-apple-system,Roboto,Helvetica,Arial,sans-serif;
  overflow:hidden;user-select:none;
}
.disp{font-family:"Arial Black","Segoe UI",system-ui,sans-serif;font-style:italic;font-weight:900;text-transform:uppercase;letter-spacing:.04em}
#app{height:100%;display:flex;flex-direction:column;max-width:1180px;margin:0 auto;position:relative}

/* HEADER */
#hud{display:flex;align-items:center;gap:10px;padding:10px 14px;
  background:linear-gradient(180deg,rgba(20,29,49,.95),rgba(15,22,38,.9));
  border-bottom:1px solid var(--edge);z-index:20;flex-wrap:wrap}
.hud-brand{display:flex;flex-direction:column;line-height:1;margin-right:6px}
.hud-brand .t{font-size:17px;color:var(--amber)}
.hud-brand .s{font-size:9px;letter-spacing:.28em;color:var(--ink-faint);text-transform:uppercase;margin-top:3px}
.pill{display:flex;align-items:center;gap:6px;background:var(--bg2);border:1px solid var(--edge);
  border-radius:999px;padding:5px 12px 5px 8px;font-weight:700;font-size:13px;white-space:nowrap}
.pill .ic{width:18px;height:18px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-style:normal}
.pill.cash .ic{background:rgba(61,220,132,.15);color:var(--green)} .pill.cash{color:var(--green)}
.pill.gold .ic{background:rgba(255,176,32,.15);color:var(--amber)} .pill.gold{color:var(--amber)}
.pill.keys .ic{background:rgba(56,214,232,.14);color:var(--cyan)} .pill.keys{color:var(--cyan)}
.pill.rep .ic{background:rgba(176,107,255,.14);color:var(--purple)} .pill.rep{color:var(--purple)}
.hud-right{margin-left:auto;display:flex;gap:8px;align-items:center}
.shop-badge{font-size:11px;color:var(--ink-dim);text-align:right;line-height:1.25}
.shop-badge b{color:var(--ink);display:block;font-size:12px}
.icon-btn{background:var(--panel);border:1px solid var(--edge);color:var(--ink-dim);border-radius:10px;width:34px;height:34px;font-size:15px;cursor:pointer}
.icon-btn:hover{border-color:var(--edge-hi);color:var(--ink)}

/* NAV */
#nav{display:flex;gap:6px;padding:8px 14px;background:var(--bg2);border-bottom:1px solid var(--edge);z-index:19;overflow-x:auto}
.nav-btn{flex:1;min-width:86px;padding:9px 8px;border-radius:10px;border:1px solid transparent;background:transparent;
  color:var(--ink-dim);font-size:12px;font-weight:800;cursor:pointer;text-transform:uppercase;letter-spacing:.06em;transition:all .15s}
.nav-btn:hover{color:var(--ink)}
.nav-btn.on{background:var(--panel2);border-color:var(--edge-hi);color:var(--amber)}

/* MAIN */
#main{flex:1;overflow-y:auto;overflow-x:hidden;padding:16px 14px 90px;position:relative;scrollbar-width:thin;scrollbar-color:var(--edge) transparent}
#main::-webkit-scrollbar{width:8px} #main::-webkit-scrollbar-thumb{background:var(--edge);border-radius:4px}
.screen{display:none;animation:fadein .25s ease} .screen.on{display:block}
@keyframes fadein{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
h2.sec{font-size:15px;color:var(--ink);margin:18px 0 10px;display:flex;align-items:center;gap:10px}
h2.sec::after{content:"";flex:1;height:1px;background:linear-gradient(90deg,var(--edge),transparent)}
h2.sec .tag{font-size:10px;color:var(--ink-faint);font-style:normal;letter-spacing:.15em;font-weight:600}
.card{background:var(--panel);border:1px solid var(--edge);border-radius:var(--r);padding:14px}
.grid{display:grid;gap:12px}
.grid.g2{grid-template-columns:repeat(auto-fill,minmax(300px,1fr))}
.grid.g3{grid-template-columns:repeat(auto-fill,minmax(230px,1fr))}
button.act{background:var(--gold-grad);color:#231400;border:none;border-radius:10px;padding:10px 16px;font-weight:900;
  font-size:13px;cursor:pointer;text-transform:uppercase;letter-spacing:.05em;font-style:italic;
  transition:transform .1s,filter .15s;box-shadow:0 4px 14px rgba(255,160,20,.25)}
button.act:hover{filter:brightness(1.08)} button.act:active{transform:scale(.97)}
button.act:disabled{background:var(--panel2);color:var(--ink-faint);box-shadow:none;cursor:not-allowed}
button.ghost{background:var(--panel2);color:var(--ink);border:1px solid var(--edge-hi);border-radius:10px;padding:9px 14px;font-weight:700;font-size:12px;cursor:pointer}
button.ghost:hover{border-color:var(--amber);color:var(--amber)}
button.ghost:disabled{opacity:.4;cursor:not-allowed}
button.danger{background:rgba(255,71,87,.12);border:1px solid rgba(255,71,87,.4);color:var(--red);border-radius:10px;padding:9px 14px;font-weight:700;font-size:12px;cursor:pointer}
.bar{height:8px;background:var(--bg);border-radius:99px;overflow:hidden;border:1px solid var(--edge)}
.bar > i{display:block;height:100%;border-radius:99px;background:var(--gold-grad);transition:width .3s}
.bar.green > i{background:linear-gradient(90deg,#3ddc84,#19b06a)}
.stat-row{display:flex;justify-content:space-between;align-items:baseline;font-size:12px;color:var(--ink-dim);margin:7px 0 3px}
.stat-row b{color:var(--ink);font-size:13px}

/* GARAGE */
#car-stage{position:relative;border-radius:16px;overflow:hidden;border:1px solid var(--edge);
  background:linear-gradient(180deg,#101a30 0%,#0c1424 55%,#070b14 56%,#0d1322 100%);
  min-height:300px;display:flex;align-items:center;justify-content:center}
#car-stage .floorline{position:absolute;left:0;right:0;top:56%;height:1px;background:rgba(120,150,220,.15)}
#car-stage .glow{position:absolute;top:-40px;left:50%;transform:translateX(-50%);width:65%;height:120px;
  background:radial-gradient(ellipse at center,rgba(255,214,120,.16),transparent 70%);pointer-events:none}
#car-svg-wrap{width:min(560px,86%);filter:drop-shadow(0 24px 22px rgba(0,0,0,.55))}
#car-stage .name-plate{position:absolute;top:14px;left:16px;z-index:3}
.name-plate .tier{font-size:10px;background:var(--panel2);border:1px solid var(--edge-hi);color:var(--cyan);
  display:inline-block;padding:2px 8px;border-radius:6px;font-weight:800;letter-spacing:.1em;font-style:normal}
.name-plate h3{font-size:22px;margin-top:5px}
.name-plate .pp{color:var(--amber);font-size:13px;font-weight:800;margin-top:2px}
#car-arrows{position:absolute;bottom:12px;right:14px;display:flex;gap:8px;align-items:center;z-index:3}
#car-arrows span{font-size:11px;color:var(--ink-faint);font-weight:700}
#garage-actions{position:absolute;top:14px;right:14px;display:flex;flex-direction:column;gap:8px;z-index:3}
.stats-strip{display:grid;grid-template-columns:repeat(5,1fr);gap:10px;margin-top:12px}
.stat-cell{background:var(--panel);border:1px solid var(--edge);border-radius:10px;padding:10px 12px}
.stat-cell .l{font-size:10px;letter-spacing:.12em;color:var(--ink-faint);text-transform:uppercase;font-weight:700}
.stat-cell .v{font-size:18px;font-weight:900;font-style:italic;margin-top:2px}
.stat-cell.et .v{color:var(--cyan)}
.upg-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(228px,1fr));gap:10px;margin-top:10px}
.upg{background:var(--panel);border:1px solid var(--edge);border-radius:12px;padding:12px;display:flex;flex-direction:column;gap:8px}
.upg .top{display:flex;justify-content:space-between;align-items:center}
.upg .nm{font-weight:800;font-size:13px}
.upg .stg{font-size:11px;color:var(--ink-dim)}
.upg .pips{display:flex;gap:4px}
.upg .pips i{width:16px;height:6px;border-radius:3px;background:var(--bg);border:1px solid var(--edge)}
.upg .pips i.f{background:var(--amber);border-color:var(--amber-deep)}
.upg .pips i.elite{background:var(--purple);border-color:var(--purple);box-shadow:0 0 6px rgba(176,107,255,.7)}
.upg .fx{font-size:11px;color:var(--cyan)}
/* fusion slots */
.fslots{display:flex;gap:6px;align-items:center}
.fslots .lbl{font-size:9px;letter-spacing:.14em;color:var(--ink-faint);font-weight:700}
.fslot{width:22px;height:22px;transform:rotate(45deg);border-radius:5px;border:1.5px dashed var(--edge-hi);
  background:var(--bg);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s}
.fslot:hover{border-color:var(--cyan)}
.fslot.locked{border-style:solid;border-color:var(--edge);opacity:.35;cursor:not-allowed}
.fslot.f-c{border:1.5px solid #9aa7c4;background:linear-gradient(135deg,#7e8aa6,#4d5871)}
.fslot.f-r{border:1.5px solid var(--cyan);background:linear-gradient(135deg,#41d9ea,#1587a0);box-shadow:0 0 8px rgba(56,214,232,.5)}
.fslot.f-e{border:1.5px solid var(--purple);background:linear-gradient(135deg,#c08bff,#6f2fd8);box-shadow:0 0 8px rgba(176,107,255,.6)}
.carsvg{width:100%;height:auto;display:block}
/* cosmetics */
.swatches{display:flex;gap:8px;flex-wrap:wrap}
.swatch{width:34px;height:34px;border-radius:9px;border:2px solid var(--edge);cursor:pointer;transition:transform .12s}
.swatch:hover{transform:scale(1.12)} .swatch.on{border-color:var(--amber);box-shadow:0 0 10px rgba(255,176,32,.5)}
.wheel-opt{display:flex;flex-direction:column;align-items:center;gap:4px;padding:8px;border:1px solid var(--edge);
  border-radius:10px;background:var(--bg2);cursor:pointer;font-size:10px;color:var(--ink-dim);font-weight:700}
.wheel-opt.on{border-color:var(--amber);color:var(--amber)}
.wheel-opt svg{width:44px;height:44px}

/* TUNING */
.tune-row{margin:16px 0}
.tune-row .th{display:flex;justify-content:space-between;font-size:12px;font-weight:800;margin-bottom:4px}
.tune-row .th .val{color:var(--cyan)}
.tune-row .hint{font-size:10px;color:var(--ink-faint);margin-top:3px}
input[type=range]{-webkit-appearance:none;width:100%;height:26px;background:transparent;cursor:pointer}
input[type=range]::-webkit-slider-runnable-track{height:8px;border-radius:99px;background:var(--bg);border:1px solid var(--edge)}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:22px;height:22px;border-radius:50%;
  background:var(--gold-grad);margin-top:-8px;border:2px solid #1a1000;box-shadow:0 0 10px rgba(255,176,32,.4)}
input[type=range]::-moz-range-track{height:8px;border-radius:99px;background:var(--bg);border:1px solid var(--edge)}
input[type=range]::-moz-range-thumb{width:20px;height:20px;border-radius:50%;background:var(--amber);border:2px solid #1a1000}
#tune-et{background:var(--bg2);border:1px solid var(--edge-hi);border-radius:12px;padding:12px;text-align:center;margin-top:8px}
#tune-et .l{font-size:9px;letter-spacing:.25em;color:var(--ink-faint)}
#tune-et .v{font-size:26px;color:var(--cyan)}
#tune-et .d{font-size:11px;font-weight:800;height:14px}

/* DEALER */
.dealer-card{background:var(--panel);border:1px solid var(--edge);border-radius:14px;overflow:hidden;display:flex;flex-direction:column}
.dealer-card .viz{background:linear-gradient(180deg,#121c33,#0b1120);padding:18px 16px 6px;position:relative}
.dealer-card .viz .tier{position:absolute;top:10px;left:10px;font-size:10px;background:rgba(10,15,26,.8);
  border:1px solid var(--edge-hi);color:var(--cyan);padding:2px 8px;border-radius:6px;font-weight:800;z-index:2}
.dealer-card .viz .owned{position:absolute;top:10px;right:10px;font-size:10px;background:rgba(61,220,132,.15);
  border:1px solid rgba(61,220,132,.5);color:var(--green);padding:2px 8px;border-radius:6px;font-weight:800;z-index:2}
.dealer-card .body{padding:12px 14px 14px;display:flex;flex-direction:column;gap:8px;flex:1}
.dealer-card h4{font-size:15px}
.dealer-card .mini{display:flex;gap:12px;font-size:11px;color:var(--ink-dim)}
.dealer-card .mini b{color:var(--ink)}
.dealer-card .buy-row{margin-top:auto;display:flex;gap:8px;align-items:center;justify-content:space-between}
.price{font-weight:900;font-style:italic;font-size:15px;color:var(--green)}
.lock-note{font-size:11px;color:var(--ink-faint)}

/* RACE LIST */
.event-tier{margin-bottom:14px}
.event-head{display:flex;align-items:center;gap:10px;margin-bottom:8px}
.event-head .badge{font-size:11px;padding:3px 10px;border-radius:6px;background:var(--panel2);border:1px solid var(--edge-hi);color:var(--cyan);font-weight:800}
.event-head h3{font-size:14px}
.event-head .prog{font-size:11px;color:var(--ink-faint);margin-left:auto}
.race-list{display:grid;gap:8px;grid-template-columns:repeat(auto-fill,minmax(280px,1fr))}
.race-row{background:var(--panel);border:1px solid var(--edge);border-radius:12px;padding:11px 13px;display:flex;align-items:center;gap:12px}
.race-row.done{opacity:.55} .race-row.locked{opacity:.4}
.race-row .who{flex:1;min-width:0}
.race-row .who .nm{font-weight:800;font-size:13px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.race-row .who .sub{font-size:11px;color:var(--ink-dim)} .race-row .who .sub b{color:var(--amber)}
.race-row.boss{border-color:rgba(255,71,87,.5);background:linear-gradient(180deg,rgba(255,71,87,.07),var(--panel))}
.race-row.boss .nm{color:var(--red)}
.chip{font-size:10px;padding:2px 7px;border-radius:5px;font-weight:800}
.chip.et{background:rgba(56,214,232,.12);color:var(--cyan)}
.chip.win{background:rgba(61,220,132,.15);color:var(--green)}

/* RACE OVERLAY */
#race-ov{position:fixed;inset:0;background:#05080f;z-index:60;display:none;flex-direction:column}
#race-ov.on{display:flex}
#race-track{flex:1;position:relative;overflow:hidden;
  background:linear-gradient(180deg,#0e1830 0%,#0a1122 34%,#151b2b 35%,#1c2336 49%,#232c44 50%,#1c2336 51%,#151b2b 65%,#0d1220 66%,#0a0e19 100%)}
.lane-line{position:absolute;left:0;right:0;height:2px;background:repeating-linear-gradient(90deg,rgba(255,255,255,.35) 0 40px,transparent 40px 80px)}
#finish-line{position:absolute;top:34%;bottom:34%;width:10px;background:repeating-linear-gradient(0deg,#fff 0 8px,#111 8px 16px);right:6%}
.race-car{position:absolute;width:170px;will-change:transform;transition:filter .2s}
.race-car.nitro{filter:drop-shadow(-14px 0 16px rgba(56,214,232,.85))}
#race-hud-top{position:absolute;top:12px;left:0;right:0;display:flex;justify-content:center;gap:18px;font-weight:900;z-index:5}
#race-hud-top .box{background:rgba(8,12,22,.8);border:1px solid var(--edge);border-radius:10px;padding:7px 14px;text-align:center;min-width:96px}
#race-hud-top .box .l{font-size:9px;letter-spacing:.2em;color:var(--ink-faint)}
#race-hud-top .box .v{font-size:19px;font-style:italic}
#race-pause{position:absolute;top:12px;right:12px;z-index:8;width:40px;height:40px;border-radius:10px;
  background:rgba(8,12,22,.85);border:1px solid var(--edge-hi);color:var(--ink);font-size:16px;cursor:pointer}
#race-msg{position:absolute;top:26%;left:0;right:0;text-align:center;font-size:44px;z-index:6;
  color:var(--amber);text-shadow:0 0 30px rgba(255,176,32,.5);pointer-events:none}
#race-panel{background:linear-gradient(180deg,#0c1220,#080c15);border-top:1px solid var(--edge);
  padding:14px;display:flex;align-items:center;gap:14px;justify-content:center;min-height:158px}
#tacho{position:relative;width:230px;height:120px}
#tacho svg{width:100%;height:100%}
.big-btn{width:112px;height:112px;border-radius:50%;border:4px solid var(--amber);
  background:radial-gradient(circle at 35% 30%,#2a3550,#141d31);color:var(--amber);
  font-weight:900;font-size:16px;font-style:italic;cursor:pointer;letter-spacing:.05em;
  box-shadow:0 0 24px rgba(255,176,32,.25),inset 0 0 22px rgba(0,0,0,.5);transition:transform .06s;text-transform:uppercase}
.big-btn:active{transform:scale(.93)}
#nitro-btn{width:84px;height:84px;border-color:var(--cyan);color:var(--cyan);font-size:13px;
  box-shadow:0 0 24px rgba(56,214,232,.3),inset 0 0 22px rgba(0,0,0,.5)}
#nitro-btn:disabled{border-color:var(--edge);color:var(--ink-faint);box-shadow:none;cursor:not-allowed}
#nitro-btn.armed{animation:npulse 1.2s infinite}
@keyframes npulse{0%,100%{box-shadow:0 0 14px rgba(56,214,232,.3)}50%{box-shadow:0 0 34px rgba(56,214,232,.75)}}
#gear-box{text-align:center;width:70px}
#gear-box .g{font-size:44px;font-weight:900;font-style:italic;color:var(--ink)}
#gear-box .l{font-size:9px;letter-spacing:.25em;color:var(--ink-faint)}
#shift-fb{position:absolute;left:0;right:0;top:-26px;text-align:center;font-weight:900;font-size:15px;font-style:italic;height:20px;transition:opacity .3s}
#pause-veil{position:absolute;inset:0;background:rgba(4,7,13,.82);backdrop-filter:blur(4px);z-index:12;display:none;align-items:center;justify-content:center}
#pause-veil.on{display:flex}
#pause-menu{background:var(--panel);border:1px solid var(--edge-hi);border-radius:16px;padding:26px;width:300px;display:flex;flex-direction:column;gap:10px;text-align:center}
#pause-menu h3{font-size:20px;margin-bottom:6px}

/* MODAL / TOASTS */
#modal-veil{position:fixed;inset:0;background:rgba(4,7,13,.75);backdrop-filter:blur(3px);z-index:80;display:none;align-items:center;justify-content:center;padding:18px}
#modal-veil.on{display:flex}
#modal{background:var(--panel);border:1px solid var(--edge-hi);border-radius:16px;max-width:480px;width:100%;
  padding:22px;box-shadow:var(--shadow);max-height:86vh;overflow-y:auto;animation:pop .22s ease}
@keyframes pop{from{transform:scale(.92);opacity:0}to{transform:scale(1);opacity:1}}
#modal h3{font-size:20px;margin-bottom:6px}
#modal .sub{color:var(--ink-dim);font-size:13px;margin-bottom:14px}
.reward-line{display:flex;justify-content:space-between;padding:8px 2px;border-bottom:1px dashed var(--edge);font-size:13px}
.reward-line b{font-style:italic}
#modal .btn-row{display:flex;gap:10px;margin-top:16px}
#modal .btn-row button{flex:1}
#toasts{position:fixed;bottom:16px;left:50%;transform:translateX(-50%);z-index:90;display:flex;flex-direction:column;gap:8px;align-items:center;pointer-events:none}
.toast{background:var(--panel2);border:1px solid var(--edge-hi);color:var(--ink);border-radius:10px;
  padding:9px 16px;font-size:13px;font-weight:700;box-shadow:var(--shadow);animation:toastin .25s ease}
.toast.good{border-color:rgba(61,220,132,.5)} .toast.bad{border-color:rgba(255,71,87,.5)}
@keyframes toastin{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:none}}

/* BUSINESS */
#biz-scene-wrap{border-radius:16px;overflow:hidden;border:1px solid var(--edge);background:linear-gradient(180deg,#0d1526,#0a0f1a)}
#biz-scene-wrap svg{width:100%;height:auto;display:block}
.biz-hero{display:flex;gap:14px;align-items:center;background:linear-gradient(120deg,var(--panel2),var(--panel));
  border:1px solid var(--edge-hi);border-radius:14px;padding:16px;margin-top:12px;flex-wrap:wrap}
.biz-hero .info{flex:1;min-width:200px}
.biz-hero h3{font-size:17px}
.biz-hero .lvl{font-size:11px;color:var(--cyan);font-weight:800;letter-spacing:.1em}

/* Universal persistence: works inside Claude (artifact storage), on any

    try{ if(window.localStorage){ const v=localStorage.getItem(k);

    return (k in this._m)? this._m[k] : null;
  },
  async set(k,v){
    let ok=false;
    try{ if(window.storage&&window.storage.set){ await window.storage.set(k,v); ok=true; this.mode='cloud'; } }catch(e){}
    if(!ok){ try{ if(window.localStorage){ localStorage.setItem(k,v); ok=true; this.mode='local'; } }catch(e){} }
    this._m[k]=v;
    return ok;
  },
  async del(k){
    try{ if(window.storage&&window.storage.delete) await window.storage.delete(k); }catch(e){}
    try{ if(window.localStorage) localStorage.removeItem(k); }catch(e){}
    delete this._m[k];
  }
};

===================================================================== */
function effStage(owned, uid){
  const base=owned.upg[uid]||0;
  const slots=(owned.fslots&&owned.fslots[uid])||[];
  return base + slots.reduce((a,r)=>a+(FUSION_VAL[r]||0),0);
}
function tpOptOf(defId){ let h=0; for(const ch of defId) h+=ch.charCodeAt(0); return 30+(h%41); }
function carStats(owned){
  const base=CARS_BY_ID[owned.id];
  let pow=base.pow, grip=base.grip, shift=base.shift, weight=base.weight;
  for(const u of UPGRADES){
    const st=effStage(owned,u.id);
    if(u.pow)    pow    += base.pow*u.pow*st;
    if(u.grip)   grip   += base.grip*u.grip*st;
    if(u.shift)  shift  -= base.shift*u.shift*st*0.9;
    if(u.weight) weight -= base.weight*u.weight*st;
  }
  const nstage=effStage(owned,'nitrous');
  const pp=Math.round(pow*0.9 + grip*0.05 + (900-shift)*0.45 - weight*0.04 + nstage*30);
  return {pow:Math.round(pow), grip:Math.round(grip), shift:Math.max(90,Math.round(shift)),
          weight:Math.round(weight), nstage, tpOpt:tpOptOf(base.id), pp};
}
const activeCar=()=>S.cars[S.activeCar];
const activeStats=()=>carStats(activeCar());
const bestCarPP=()=>Math.max(...S.cars.map(c=>carStats(c).pp));

/* =====================================================================
   PHYSICS — shared by the live race, the dyno estimate, and event balance
   Force model: engine power vs traction cap, aero drag, gear ratios.
===================================================================== */
const QUARTER=402;                       // meters
const G_FRAC=[0.15,0.25,0.38,0.53,0.72,1.0];
function fdMult(tune){ return 1.15 - (tune.fd/100)*0.30; }   // right = shorter gears
function makeSim(st, tune){
  const vTop=Math.max(45, 22*Math.log(st.pow)-57) * fdMult(tune);
  return {v:0,x:0,t:0,gear:1,rpm:2600,deadUntil:-1,
    nitroUsed:false,nitroUntil:-1,nitroPow:0,
    spinUntil:-1,bogUntil:-1,vTop,done:false,et:0};
}
const gearTop=(s,g)=>s.vTop*G_FRAC[g-1];
const rpmOf=s=>1200 + 7800*clamp(s.v/gearTop(s,s.gear),0,1.03);
function engineEff(rpm){
  if(rpm<1500) return .5;
  if(rpm<=7200) return .5 + .5*(rpm-1500)/5700;
  if(rpm<=8400) return 1.0;
  return .62;                                  // banging the limiter
}
function tracMult(st,tune){ return Math.max(.90, 1.05 - .003*Math.abs(tune.tp-st.tpOpt)); }
function stepSim(s, st, tune, dt){
  if(s.done) return;
  s.t+=dt;
  let F=0;
  if(s.t>=s.deadUntil){
    let eff=engineEff(s.rpm);
    if(s.t<s.bogUntil) eff*=.45;
    let hp=st.pow*eff;
    if(s.t<s.nitroUntil) hp+=s.nitroPow;
    F=hp*745.7/Math.max(s.v,5);
  }
  const Ftrac=st.grip*3.2*tracMult(st,tune)*(s.t<s.spinUntil?.62:1);
  F=Math.min(F,Ftrac) - .45*s.v*s.v - 180;
  s.v=Math.max(0, s.v + (F/(st.weight*.4536))*dt);
  s.x+=s.v*dt;
  s.rpm=rpmOf(s);
  if(s.x>=QUARTER){ s.done=true; s.et=s.t - (s.x-QUARTER)/Math.max(s.v,1); }
}
function simShift(s, st, quality){        // 'perfect' | 'good' | 'poor'
  if(s.gear>=6) return;
  s.gear++;
  s.deadUntil=s.t + (st.shift/1000)*(quality==='perfect'?.45:quality==='good'?.8:1.15);
  s.rpm=rpmOf(s);
}
function fireNitro(s, st, tune){
  if(s.nitroUsed || st.nstage<=0) return false;
  s.nitroUsed=true;
  const p=.6+(tune.nos/100)*1.2;
  s.nitroPow=st.pow*(.08+.05*st.nstage)*p;
  s.nitroUntil=s.t + 3.5*(.6+((100-tune.nos)/100)*1.2);
  return true;
}
function simulateET(st, tune, mode){      // autopilot: 'good' | 'perfect'
  const s=makeSim(st,tune);
  if(mode==='perfect') s.v=1.5;
  const dt=1/120;
  while(!s.done && s.t<30){
    if(s.t>=s.deadUntil && s.gear<6 && s.rpm>=7600) simShift(s,st, mode==='perfect'?'perfect':'good');
    if(!s.nitroUsed && st.nstage>0 && s.gear>=3) fireNitro(s,st,tune);
    stepSim(s,st,tune,dt);
  }
  return s.done? s.et : 30;
}

/* ---- events, self-calibrated against the physics ---- */
let EVENTS=[];
function buildEvents(){
  EVENTS=[];
  for(let t=1;t<=5;t++){
    const tierCars=CARS.filter(c=>c.tier===t && !c.wheelOnly);
    const entry=tierCars.reduce((a,b)=>a.price<b.price?a:b);          // cheapest = entry car
    const best =tierCars.reduce((a,b)=>simulateET(stockStats(a.id),DEFAULT_TUNE(),'good')<simulateET(stockStats(b.id),DEFAULT_TUNE(),'good')?a:b);
    const entryPerfect=simulateET(stockStats(entry.id),DEFAULT_TUNE(),'perfect');
    const maxedPerfect=simulateET(stage5Stats(best.id),DEFAULT_TUNE(),'perfect');
    const race0=entryPerfect+0.15, bossET=maxedPerfect+0.12, lastReg=bossET+0.30;
    const n=8, races=[];
    for(let i=0;i<n;i++){
      races.push({
        id:`t${t}r${i}`, tier:t, idx:i,
        name:`${RIVAL_FIRST[(t*7+i*3)%RIVAL_FIRST.length]} “${RIVAL_CREW[(t*3+i)%RIVAL_CREW.length]}”`,
        et:+(race0+(lastReg-race0)*i/(n-1)).toFixed(2), boss:false,
        cash:Math.round((t===1?2600:t===2?9000:t===3?26000:t===4?70000:190000)*(1+i*0.28)/100)*100,
        rep:Math.round(t*t*14*(1+i*0.3)),
      });
    }
    races.push({
      id:`t${t}boss`, tier:t, idx:n, boss:true,
      name:`${['“Wrench” Marta','Deacon Cross','Yumi Kurogane','Baron Volt','The Architect'][t-1]} — Tier Boss`,
      et:+bossET.toFixed(2),
      cash:Math.round((t===1?18000:t===2?60000:t===3?170000:t===4?450000:1200000)/100)*100,
      rep:t*t*140, keys:2, gold:t*25,
    });
    EVENTS.push({tier:t, races});
  }
  for(const c of CARS) c.stockET=simulateET(stockStats(c.id),DEFAULT_TUNE(),'good');
}

function sponsorMult(kind){
  let m=1;
  for(const sp of SPONSORS){
    const ch=S.sponsors[sp.id]; if(!ch) continue;
    const deal=sp[ch];
    if(deal.k===kind || deal.k==='all') m+=deal.v;
  }
  return m;
}
function mechIncome(){
  const shop=SHOP_LEVELS[S.shopLvl];
  let inc=0;
  for(const m of S.mechs) inc+=14*(1+m.lvl*0.6);
  return inc*shop.mult*(1+S.equip.lift*0.20)*sponsorMult('shop');

  let inc=0;
  const pp=S.cars.length?bestCarPP():0;
  for(const d of S.drivers) inc+=(pp*0.055)*(1+d.lvl*0.5);
  return inc*sponsorMult('driver')*sponsorMult('shop');

    s+='</g>'; ex+=66; return s;
  };
  const dynoInner=`<polyline points="${ex+8},${eqY+30} ${ex+16},${eqY+16} ${ex+26},${eqY+34} ${ex+36},${eqY+12} ${ex+48},${eqY+26}" fill="none" stroke="#38d6e8" stroke-width="2"/>`;

    const fabInner=`<text x="${ex+28}" y="${eqY+32}" font-size="19" text-anchor="middle">⚙️</text>`;
    g+=drawEq(S.equip.printer>0,S.equip.printer,3,'FABRICATOR',fabInner);
  }
  // driver crew outside with your best car
  if(S.drivers.length){
    const dx=bx+bw+26;
    g+=`<g><path d="M${dx} ${ground-14} q6 -14 24 -15 l34 -2 q20 2 26 17 z" fill="#ffb020"/>
      <circle cx="${dx+16}" cy="${ground-12}" r="7" fill="#0b0d12"/><circle cx="${dx+64}" cy="${ground-12}" r="7" fill="#0b0d12"/></g>`;
    const dn=Math.min(3,S.drivers.length);
    for(let i=0;i<dn;i++)
      g+=`<text x="${dx+92+i*22}" y="${ground-6}" font-size="17">🏎️</text>`;
    if(S.drivers.length>3) g+=`<text x="${dx+92+dn*22}" y="${ground-10}" font-size="10" fill="#8b99b8" font-weight="800">+${S.drivers.length-3}</text>`;
    g+=`<text x="${dx+40}" y="${ground-38}" font-size="9" fill="#38d6e8" font-weight="800" text-anchor="middle">RACE CREW</text>`;
  }
  // contract activity banner
  if(S.contract!==null){

  }
  return `<svg viewBox="0 0 ${W} ${H}" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Your workshop">${g}</svg>`;
}

const $=s=>document.querySelector(s);

function toast(msg, kind=''){
  const t=document.createElement('div');
  t.className='toast '+kind; t.textContent=msg;
  $('#toasts').appendChild(t);
  setTimeout(()=>{t.style.opacity='0'; t.style.transition='opacity .4s'; setTimeout(()=>t.remove(),400)},2600);
}
function modal(html){ $('#modal').innerHTML=html; $('#modal-veil').classList.add('on'); }

let AC=null;
function sfx(type){
  if(!S.sfx) return;
  try{
    AC = AC || new (window.AudioContext||window.webkitAudioContext)();
    const o=AC.createOscillator(), g=AC.createGain();
    o.connect(g); g.connect(AC.destination);
    const now=AC.currentTime;
    const conf={
      click:[520,.05,'square',.05], buy:[760,.12,'triangle',.09], win:[880,.4,'triangle',.12],
      lose:[180,.35,'sawtooth',.08], shift:[980,.06,'square',.07], bad:[140,.12,'sawtooth',.09],
      spin:[420,.08,'square',.05], jackpot:[1200,.5,'triangle',.14]
    }[type]||[440,.1,'sine',.06];
    o.type=conf[2]; o.frequency.setValueAtTime(conf[0],now);
    if(type==='win'||type==='jackpot') o.frequency.exponentialRampToValueAtTime(conf[0]*1.8,now+conf[1]);
    if(type==='lose') o.frequency.exponentialRampToValueAtTime(90,now+conf[1]);
    g.gain.setValueAtTime(conf[3],now); g.gain.exponentialRampToValueAtTime(.0001,now+conf[1]);
    o.start(now); o.stop(now+conf[1]+.02);
  }catch(e){}
}

function statCell(l,v){return `<div class="stat-cell"><div class="l">${l}</div><div class="v disp">${v}</div></div>`;}
function upgCard(owned,def,u){
  const st=owned.upg[u.id]||0;
  const pips=Array.from({length:6},(_,i)=>`<i class="${i<st?(i===5?'f elite':'f'):''}"></i>`).join('');
  const slots=owned.fslots[u.id].map((r,i)=>{
    const locked=st<FUSION_SLOT_REQ[i];
    return `<div class="fslot ${locked?'locked':r?('f-'+r):''}" data-cat="${u.id}" data-i="${i}"
      title="${locked?'Unlocks at stage '+FUSION_SLOT_REQ[i]:r?RARITY_NAME[r]+' fusion part':'Empty fusion slot'}"></div>`;
  }).join('');
  let btn;
  if(st>=6) btn=`<button class="ghost" disabled>Maxed — Elite</button>`;
  else if(st>=5) btn=`<button class="ghost" disabled>Stage 6: Fortune only</button>`;
  else{
    const cost=UPG_COST(def,st);
    btn=`<button class="act" data-upg="${u.id}" ${S.cash<cost?'disabled':''}>Stage ${st+1} — $${fmt(cost)}</button>`;
  }
  return `<div class="upg">
    <div class="top"><span class="nm">${u.name}</span><span class="stg">Stage ${st}/6</span></div>
    <div class="pips">${pips}</div>
    <div class="fslots"><span class="lbl">FUSION</span>${slots}</div>
    <div class="fx">${u.fx}${effStage(owned,u.id)>st?` <b style="color:var(--purple)">+${((effStage(owned,u.id)-st)*100/1).toFixed(0)}% fused</b>`:''}</div>${btn}</div>`;
}
function buyUpgrade(id){
  const owned=activeCar(), def=CARS_BY_ID[owned.id];
  const st=owned.upg[id]||0;
  if(st>=5) return;
  const cost=UPG_COST(def,st);
  if(S.cash<cost){toast('Not enough cash','bad'); sfx('bad'); return;}
  S.cash-=cost; owned.upg[id]=st+1;
  sfx('buy'); toast(`${UPGRADES.find(u=>u.id===id).name} → Stage ${st+1}`,'good');
  renderHUD(); renderGarage(); saveGame();
}

/* ---- fusion slots (CSR2-style: fit parts from inventory into category slots) ---- */
function clickFusionSlot(cat,i){
  const owned=activeCar();
  const st=owned.upg[cat]||0;
  if(st<FUSION_SLOT_REQ[i]){ toast(`Slot unlocks at ${UPGRADES.find(u=>u.id===cat).name} stage ${FUSION_SLOT_REQ[i]}`,'bad'); return; }
  const fitted=owned.fslots[cat][i];
  const inv=S.parts[cat];
  const catName=UPGRADES.find(u=>u.id===cat).name;
  modal(`<h3 class="disp">${catName} — Fusion slot ${i+1}</h3>
    <div class="sub">${fitted?`Fitted: <b>${RARITY_ICON[fitted]} ${RARITY_NAME[fitted]}</b> (+${FUSION_VAL[fitted]*100}% of a stage). Remove to swap.`:
      'Fit a fusion part to boost this category beyond its stage. Parts come from race wins, Fortune crates, and stripping cars.'}</div>
    ${fitted?`<div class="btn-row"><button class="ghost" onclick="closeModal()">Keep</button>
      <button class="danger" onclick="unfitFusion('${cat}',${i})">Remove part</button></div>`
    :`
    ${['c','r','e'].map(r=>`<div class="reward-line"><span>${RARITY_ICON[r]} ${RARITY_NAME[r]} ${catName} part <small style="color:var(--ink-faint)">(+${FUSION_VAL[r]*100}% stage)</small></span>
      <b>×${inv[r]} ${inv[r]>0?`&nbsp;<button class="act" style="padding:4px 12px;font-size:11px" onclick="fitFusion('${cat}',${i},'${r}')">Fit</button>`:''}</b></div>`).join('')}
    <div class="btn-row"><button class="ghost" onclick="closeModal()">Close</button></div>`}`);
}
function fitFusion(cat,i,r){
  if(S.parts[cat][r]<1) return;
  S.parts[cat][r]--; activeCar().fslots[cat][i]=r;
  sfx('buy'); toast(`${RARITY_NAME[r]} fusion part fitted to ${UPGRADES.find(u=>u.id===cat).name}`,'good');
  closeModal(); renderGarage(); saveGame();
}
function unfitFusion(cat,i){
  const r=activeCar().fslots[cat][i];
  if(!r) return;
  activeCar().fslots[cat][i]=null; S.parts[cat][r]++;
  sfx('click'); closeModal(); renderGarage(); saveGame();
}
function grantParts(n, weights){ // returns summary lines
  const lines=[];
  for(let i=0;i<n;i++){
    const cat=pick(CAT_IDS);
    const roll=Math.random()*100;
    const r = roll<weights.e? 'e' : roll<weights.e+weights.r? 'r':'c';
    S.parts[cat][r]++;
    lines.push(`${RARITY_ICON[r]} ${RARITY_NAME[r]} ${UPGRADES.find(u=>u.id===cat).name}`);
  }
  return lines;
}

const R={on:false};
function findRace(id){ for(const ev of EVENTS){ const r=ev.races.find(x=>x.id===id); if(r) return r; } return null; }

function startRace(id){
  const race=findRace(id); if(!race) return;
  const owned=activeCar();
  R.race=race; R.on=true; R.paused=false; R.phase='launch';
  R.st=carStats(owned); R.tune={...owned.tune};
  R.sim=null; R.launch=null; R.finished=false; R.pDone=false; R.oDone=false;
  R.oppT=0;
  R.oET=race.et*rnd(.997,1.003);
  R.launchNeedle=1400; R.launchDir=1; R.countdown=0;
  $('#race-ov').classList.add('on');
  $('#pause-veil').classList.remove('on');
  $('#rc-you').innerHTML=carSVG(CARS_BY_ID[owned.id],owned,{flip:true});
  const rivalDef=pick(CARS.filter(c=>c.tier===race.tier && !c.wheelOnly));
  $('#rc-rival').innerHTML=carSVG(rivalDef,null,{flip:true});
  $('#rc-you').classList.remove('nitro'); $('#rc-rival').classList.remove('nitro');
  $('#rc-you').style.top='55%'; $('#rc-rival').style.top='36%';
  setCarX('#rc-you',0); setCarX('#rc-rival',0);
  $('#gear-num').textContent='N';
  $('#shift-fb').textContent='';
  $('#shift-btn').textContent='LAUNCH';
  const nb=$('#nitro-btn');
  nb.disabled=true; nb.classList.remove('armed'); nb.textContent=R.st.nstage>0?'NITRO':'NO NOS';
  $('#rh-you').textContent='0.00s'; $('#rh-rival').textContent='0.00s'; $('#rh-speed').textContent='0';
  $('#race-msg').textContent='HOLD THE REVS…';
  R.lastFrame=0;
  R.raf=requestAnimationFrame(raceFrame);
  drawTacho(1400,'launch');
  if(!S.tutorial.race){ S.tutorial.race=true; saveGame();
    setTimeout(()=>toast('Tap LAUNCH in the green band. Nitro fires whenever YOU choose.'),300); }
}
function setCarX(sel,p){
  const track=$('#race-track').getBoundingClientRect();
  const finish=track.width*0.94-180;
  $(sel).style.transform=`translateX(${20+clamp(p,0,1.02)*finish}px)`;
}
function drawTacho(rpm, mode){
  const svg=$('#tacho-svg');
  const cx=115, cy=112, rad=92, MAX=9000;
  const a=r=>(200-(r/MAX)*220)*Math.PI/180;
  const pt=(ang,rr)=>[cx+rr*Math.cos(ang), cy-rr*Math.sin(ang)];
  const arc=(r1,r2,col,w)=>{const [x1,y1]=pt(a(r1),rad),[x2,y2]=pt(a(r2),rad);
    return `<path d="M${x1} ${y1} A${rad} ${rad} 0 ${(r2-r1)/MAX>0.5?1:0} 1 ${x2} ${y2}" stroke="${col}" stroke-width="${w}" fill="none" stroke-linecap="round"/>`};
  const gLo=mode==='launch'?5400:7200, gHi=mode==='launch'?7000:8400;
  let ticks='';
  for(let r=0;r<=MAX;r+=1000){
    const [x1,y1]=pt(a(r),rad-6),[x2,y2]=pt(a(r),rad+4);
    ticks+=`<line x1="${x1}" y1="${y1}" x2="${x2}" y2="${y2}" stroke="#5a6885" stroke-width="2"/>
    <text x="${pt(a(r),rad-20)[0]}" y="${pt(a(r),rad-20)[1]+3}" fill="#8b99b8" font-size="9" text-anchor="middle" font-weight="700">${r/1000}</text>`;
  }
  const [nx,ny]=pt(a(clamp(rpm,0,MAX)),rad-14);
  svg.innerHTML=`
    ${arc(0,MAX,'#263453',10)}
    ${arc(gLo,gHi,'#3ddc84',10)}
    ${mode==='launch'?arc(5900,6600,'#b7ff5e',10):''}
    ${arc(8600,MAX,'#ff4757',10)}
    ${ticks}
    <line x1="${cx}" y1="${cy}" x2="${nx}" y2="${ny}" stroke="#ffb020" stroke-width="4" stroke-linecap="round"/>
    <circle cx="${cx}" cy="${cy}" r="7" fill="#ffb020"/>
    <text x="${cx}" y="${cy-34}" fill="#e9eefb" font-size="15" font-weight="900" font-style="italic" text-anchor="middle">${Math.round(rpm)}</text>
    <text x="${cx}" y="${cy-22}" fill="#5a6885" font-size="8" text-anchor="middle" letter-spacing="2">RPM</text>`;
}
function raceFrame(ts){
  if(!R.on) return;
  if(!R.lastFrame) R.lastFrame=ts;
  const dt=Math.min(1/30,(ts-R.lastFrame)/1000); R.lastFrame=ts;
  if(R.paused){ R.raf=requestAnimationFrame(raceFrame); return; }

  if(R.phase==='launch'){
    R.launchNeedle+=R.launchDir*dt*5200;
    if(R.launchNeedle>8600){R.launchNeedle=8600;R.launchDir=-1;}
    if(R.launchNeedle<1400){R.launchNeedle=1400;R.launchDir=1;}
    drawTacho(R.launchNeedle,'launch');
  }
  else if(R.phase==='count'){
    R.countdown-=dt;
    $('#race-msg').textContent = R.countdown<=0.45?'GO!':(Math.ceil(R.countdown/0.5)>=2?'READY':'SET');
    if(R.countdown<=0) beginRun();
    drawTacho(2600,'run');
  }
  else if(R.phase==='run'){
    const s=R.sim;
    if(!s.done) stepSim(s,R.st,R.tune,dt);
    R.oppT+=dt;
    // nitro visual state
    $('#rc-you').classList.toggle('nitro', s.t<s.nitroUntil);
    drawTacho(s.rpm,'run');
    setCarX('#rc-you', s.x/QUARTER);
    setCarX('#rc-rival', Math.pow(clamp(R.oppT/R.oET,0,1),1.5));
    $('#rh-you').textContent=(s.done?s.et:s.t).toFixed(2)+'s';
    $('#rh-rival').textContent=(R.oppT>=R.oET?R.oET:R.oppT).toFixed(2)+'s';
    $('#rh-speed').textContent=Math.round(s.v*2.237);
    if(s.done && !R.pDone){ R.pDone=true; flashFB(s.et.toFixed(2)+'s RUN', -1); }
    if(R.oppT>=R.oET) R.oDone=true;
    if(R.pDone && R.oDone && !R.finished){ R.finished=true; endRace(s.et<=R.oET); return; }
    if(s.t>28 && !R.finished){ R.finished=true; endRace(false); return; }
  }
  R.raf=requestAnimationFrame(raceFrame);
}
$('#shift-btn').addEventListener('click',()=>{
  if(!R.on||R.paused) return;
  if(R.phase==='launch'){
    const d=R.launchNeedle;
    if(d>=5900&&d<=6600){R.launch='perfect';flashFB('PERFECT LAUNCH',-1);sfx('win');}
    else if(d>=5400&&d<=7000){R.launch='clean';flashFB('CLEAN LAUNCH',-1);sfx('shift');}
    else if(d>7000){R.launch='spin';flashFB('WHEELSPIN!',1);sfx('bad');}
    else {R.launch='bog';flashFB('BOGGED DOWN',1);sfx('bad');}
    R.phase='count'; R.countdown=1.4;
    $('#gear-num').textContent='1';
    $('#shift-btn').textContent='SHIFT';
    $('#race-msg').textContent='READY';
  }
  else if(R.phase==='run'){
    const s=R.sim;
    if(s.gear>=6){flashFB('TOP GEAR',1);return;}
    const r=s.rpm; let q;
    if(r>=7200&&r<=8400){q='perfect';flashFB('PERFECT SHIFT',-1);sfx('shift');}
    else if(r>=6400&&r<=8800){q='good';flashFB('GOOD',0);sfx('click');}
    else if(r>8800){q='poor';flashFB('LATE!',1);sfx('bad');}
    else {q='poor';flashFB('EARLY!',1);sfx('bad');}
    simShift(s,R.st,q);
    $('#gear-num').textContent=s.gear;
  }
});
$('#nitro-btn').addEventListener('click',()=>{
  if(!R.on||R.paused||R.phase!=='run') return;
  const s=R.sim;
  if(fireNitro(s,R.st,R.tune)){
    flashFB('NITRO!',-1); sfx('jackpot');
    const nb=$('#nitro-btn');

});
function flashFB(txt,mood){
  const fb=$('#shift-fb');
  fb.textContent=txt;
  fb.style.color = mood<0?'var(--cyan)':mood>0?'var(--red)':'var(--green)';

function beginRun(){
  R.phase='run';
  $('#race-msg').textContent='';
  const s=makeSim(R.st,R.tune);
  if(R.launch==='perfect') s.v=1.5;
  if(R.launch==='spin') s.spinUntil=1.1;
  if(R.launch==='bog') s.bogUntil=0.9;
  R.sim=s;
  if(R.st.nstage>0){ const nb=$('#nitro-btn'); nb.disabled=false; nb.classList.add('armed'); }
}

$('#race-pause').addEventListener('click',()=>{

function endRace(won){
  cancelAnimationFrame(R.raf);
  R.on=false;
  S.stats.races++;
  const race=R.race, pET=R.sim&&R.sim.done?R.sim.et:99;
  setTimeout(()=>{
    $('#race-ov').classList.remove('on');
    if(won){
      sfx('win');
      S.stats.wins++;
      const firstTime=!S.racesWon[race.id];
      const mult=sponsorMult('race'), repMult=sponsorMult('rep');
      const cash=Math.round(race.cash*(firstTime?1:0.35)*mult);
      const rep=Math.round(race.rep*(firstTime?1:0.3)*repMult);
      S.cash+=cash; S.rep+=rep; S.stats.earned+=cash;
      let extra='';
      if(firstTime && race.keys){S.keys+=race.keys; extra+=`<div class="reward-line"><span>⚿ Fortune keys</span><b>+${race.keys}</b></div>`;}
      if(firstTime && race.gold){S.gold+=race.gold; extra+=`<div class="reward-line"><span>◆ Gold</span><b>+${race.gold}</b></div>`;}
      if(firstTime && race.boss){
        const lines=grantParts(3,{e:8,r:50});
        extra+=lines.map(l=>`<div class="reward-line"><span>${l} fusion part</span><b>+1</b></div>`).join('');
      } else if(Math.random()<0.35){
        const lines=grantParts(1,{e:2,r:18});
        extra+=`<div class="reward-line"><span>${lines[0]} fusion part</span><b>+1</b></div>`;
      }
      S.racesWon[race.id]=true;
      const bossNote=race.boss&&firstTime?`<div class="sub" style="margin-top:10px;color:var(--amber)">🏆 Tier ${race.tier} conquered — ${race.tier<5?'Tier '+(race.tier+1)+' showroom & events unlocked!':'you rule the Apex Finals.'}</div>`:'';
      modal(`<h3 class="disp" style="color:var(--green)">You won!</h3>
        <div class="sub">${race.name} — beaten by ${(R.oET-pET).toFixed(2)}s. Your run: <b>${pET.toFixed(2)}s</b></div>
        <div class="reward-line"><span>💵 Winnings ${mult>1?`<small style="color:var(--cyan)">(sponsor ×${mult.toFixed(2)})</small>`:''}</span><b>+$${fmt(cash)}</b></div>
        <div class="reward-line"><span>★ Reputation</span><b>+${fmt(rep)}</b></div>
        ${extra}${bossNote}
        <div class="btn-row"><button class="ghost" onclick="closeModal();show('garage')">Tune up</button>
        <button class="act" onclick="closeModal();show('race')">Next race</button></div>`);
    } else {
      sfx('lose');
      modal(`<h3 class="disp" style="color:var(--red)">Beaten.</h3>
        <div class="sub">${race.name} ran <b>${R.oET.toFixed(2)}s</b> to your <b>${pET>=99?'DNF':pET.toFixed(2)+'s'}</b>. Upgrade, tune the dyno, or chase perfect shifts (green band) and a perfect launch (bright green sliver).</div>
        <div class="btn-row"><button class="ghost" onclick="closeModal();show('garage')">Upgrade</button>
        <button class="act" onclick="closeModal();startRace('${race.id}')">Rematch</button></div>`);
    }
    renderHUD(); saveGame();
    if(curScreen==='race') renderRace();
  }, 900);
}

  };
  const hm=$('#hire-mech'); if(hm) hm.onclick=()=>{
    S.cash-=MECH_HIRE(S.mechs.length);
    S.mechs.push({name:newStaffName(),lvl:0,av:pick(['🧑‍🔧','👨‍🔧','👩‍🔧'])});
    sfx('buy'); toast(S.mechs[S.mechs.length-1].name+' joined the crew','good');
    renderHUD(); renderBiz(); saveGame();
  };
  const hd=$('#hire-driver'); if(hd) hd.onclick=()=>{
    S.cash-=DRIVER_HIRE(S.drivers.length);
    S.drivers.push({name:newStaffName(),lvl:0,av:pick(['🏎️','🪖','🕶️'])});
    sfx('buy'); toast(S.drivers[S.drivers.length-1].name+' is on the grid','good');
    renderHUD(); renderBiz(); saveGame();
  };
  el.querySelectorAll('[data-train]').forEach(b=>b.onclick=()=>{
    const [role,idx]=b.dataset.train.split(':');
    const st=role==='mech'?S.mechs[+idx]:S.drivers[+idx];
    const cost=TRAIN_COST(st.lvl);
    if(S.cash<cost||st.lvl>=5) return;
    S.cash-=cost; st.lvl++;
    sfx('buy'); toast(st.name+' trained to level '+(st.lvl+1),'good');
    renderHUD(); renderBiz(); saveGame();
  });
  el.querySelectorAll('[data-contract]').forEach(b=>b.onclick=()=>{
    const i=+b.dataset.contract, c=CONTRACTS[i];
    const t=Math.round(c.time*Math.pow(0.88,S.equip.dyno));
    S.contract={idx:i, ends:Date.now()+t*1000, total:t*1000};
    sfx('click'); toast('Job started: '+c.name);
    renderBiz(); saveGame();
  });
  el.querySelectorAll('[data-equip]').forEach(b=>b.onclick=()=>{
    const eq=EQUIPMENT.find(e=>e.id===b.dataset.equip);
    const lvl=S.equip[eq.id];
    const cost=Math.round(eq.base*Math.pow(2.4,lvl));
    if(S.cash<cost||lvl>=eq.maxLvl) return;
    S.cash-=cost; S.equip[eq.id]++;
    sfx('buy'); toast(eq.name+' upgraded — check the shop floor','good');
    renderHUD(); renderBiz(); saveGame();
  });
  el.querySelectorAll('[data-sp]').forEach(b=>b.onclick=()=>{
    const sp=SPONSORS.find(x=>x.id===b.dataset.sp);
    S.sponsors[sp.id]=b.dataset.ch;
    sfx('jackpot'); toast('Signed with '+sp.name+'!','good');
    renderBiz(); renderHUD(); saveGame();
  });
  if(!S.tutorial.biz){ S.tutorial.biz=true; saveGame();
    toast('Hire mechanics — the shop scene fills up as your empire grows.');
  }
}
function staffCard(st,i,role){
  const out = role==='mech'
    ? '$'+fmt(14*(1+st.lvl*0.6)*SHOP_LEVELS[S.shopLvl].mult*(1+S.equip.lift*0.20)*sponsorMult('shop'))+'/s from client work'
    : '$'+fmt((bestCarPP()*0.055)*(1+st.lvl*0.5)*sponsorMult('driver')*sponsorMult('shop'))+'/s + rep from street races';
  const cost=TRAIN_COST(st.lvl);
  return `<div class="staff-card">
    <div class="avatar">${st.av}</div>
    <div>
      <div class="nm">${st.name}</div>
      <div class="role ${role}">${role==='mech'?'Mechanic':'Crew driver'} · Lv ${st.lvl+1}</div>
      <div class="out">${out}</div>
      <div class="lvl-pips">${Array.from({length:6},(_,x)=>`<i class="${x<=st.lvl?'f':''}"></i>`).join('')}</div>
    </div>
    <div class="side">
      <button class="ghost" data-train="${role}:${i}" ${st.lvl>=5||S.cash<cost?'disabled':''}>${st.lvl>=5?'MAX':'Train $'+fmt(cost)}</button>
    </div>
  </div>`;
}
function activeContractHTML(){
  const c=CONTRACTS[S.contract.idx];
  const left=Math.max(0,S.contract.ends-Date.now());
  const pct=100*(1-left/S.contract.total);
  return `<div class="contract" style="border-color:var(--edge-hi)">
    <div class="t"><span class="nm">🔧 In progress: ${c.name}</span><span class="pay">$${fmt(Math.round(c.pay*(1+S.equip.paint*0.15)*sponsorMult('contract')))}</span></div>
    <div class="desc">${c.desc}</div>
    <div class="bar green"><i style="width:${pct}%"></i></div>
    <div class="meta"><span id="contract-timer">⏱ ${Math.ceil(left/1000)}s remaining</span></div>
  </div>`;
}

/* =====================================================================
   FORTUNE
===================================================================== */
let spinning=false;
function renderFortune(){
  const el=$('#s-fortune');
  const partChips=CAT_IDS.map(c=>{
    const p=S.parts[c], tot=p.c+p.r+p.e;
    if(!tot) return '';
    return `<span class="inv-chip">${UPGRADES.find(u=>u.id===c).name}: ${p.c?`🔩${p.c} `:''}${p.r?`🔷${p.r} `:''}${p.e?`🟣${p.e}`:''}</span>`;
  }).join('');
  el.innerHTML=`
  <div id="fortune-box">
    <div id="machine">
      <h3 class="disp">The Fortune Machine</h3>
      <div class="tag">Elite parts · Fusion crates · One legend</div>
      <div id="reel-window">
        <div class="fade l"></div><div class="fade r"></div>
        <div id="reel"></div>
      </div>
      <div id="spin-row">
        <button class="act" id="spin-key" ${S.keys<1?'disabled':''}>Spin — 1 ⚿ key (${S.keys})</button>
        <button class="ghost" id="spin-gold" ${S.gold<60?'disabled':''}>Spin — 60 ◆ gold</button>
      </div>
      <div id="fortune-note">Keys come from boss races${S.equip.printer?', your Parts Fabricator':''}${S.sponsors.sp5==='b'?', your Orbital deal':''}.
      Stage-6 Elite installs on your selected car; Fusion Crates feed the ◇ slots in the garage.</div>
    </div>
    ${partChips?`<h2 class="sec disp">Fusion parts inventory <span class="tag">FIT THEM IN THE GARAGE ◇ SLOTS</span></h2>
    <div class="card">${partChips}</div>`:''}
    <h2 class="sec disp">Odds <span class="tag">FULL TRANSPARENCY, NO FUNNY BUSINESS</span></h2>
    <div class="grid g3">
      ${PRIZES.map(p=>{
        const tot=PRIZES.reduce((a,x)=>a+x.w,0);
        return `<div class="card" style="display:flex;gap:10px;align-items:center;padding:10px 12px">
          <span style="font-size:20px">${p.ic}</span>
          <div style="flex:1"><b style="font-size:12px">${p.nm}</b>
          <div style="font-size:10px;color:var(--ink-faint)">${{c:'Common',r:'Rare',e:'Elite',l:'Legendary'}[p.rar]}</div></div>
          <b style="font-size:12px;color:var(--ink-dim)">${(100*p.w/tot).toFixed(1)}%</b>
        </div>`;}).join('')}
    </div>
  </div>`;
  buildReel();
  $('#spin-key').onclick=()=>doSpin('key');
  $('#spin-gold').onclick=()=>doSpin('gold');
  if(!S.tutorial.fortune){ S.tutorial.fortune=true; saveGame();
    toast('Fusion Crates + Stage-6 Elites only drop here. Boss races pay keys.');
  }
}
const prizeCardHTML=p=>`<div class="prize-card rar-${p.rar}"><span class="ic">${p.ic}</span><span class="nm">${p.nm}</span></div>`;
let reelItems=[];
function buildReel(){
  const reel=$('#reel');
  reelItems=[];
  for(let i=0;i<60;i++) reelItems.push(pick(PRIZES));
  reel.style.transition='none';
  reel.style.transform='translateX(0px)';
  reel.innerHTML=reelItems.map(prizeCardHTML).join('');
}
function weightedPrize(){
  const tot=PRIZES.reduce((a,p)=>a+p.w,0);
  let r=Math.random()*tot;
  for(const p of PRIZES){ if((r-=p.w)<0) return p; }
  return PRIZES[0];
}
function doSpin(payWith){
  if(spinning) return;
  if(payWith==='key'){ if(S.keys<1){toast('No keys — beat boss races!','bad');return;} S.keys--; }
  else { if(S.gold<60){toast('Not enough gold','bad');return;} S.gold-=60; }
  spinning=true; S.stats.spins++;
  renderHUD(); sfx('spin');
  const prize=weightedPrize();
  const slot=46;
  reelItems[slot]=prize;
  const reel=$('#reel');
  reel.innerHTML=reelItems.map(prizeCardHTML).join('');
  reel.style.transition='none'; reel.style.transform='translateX(0px)';
  const cardW=104+8;
  const windowW=$('#reel-window').clientWidth;
  const target=slot*cardW+52-windowW/2+rnd(-30,30);
  requestAnimationFrame(()=>{requestAnimationFrame(()=>{
    reel.style.transition='transform 4.2s cubic-bezier(.12,.65,.08,1)';
    reel.style.transform=`translateX(${-target}px)`;
  });});
  setTimeout(()=>{ grantPrize(prize); spinning=false; }, 4500);
}
function spinAgain(){
  closeModal(); renderFortune();
  setTimeout(()=>{ if(S.keys>=1) doSpin('key'); else if(S.gold>=60) doSpin('gold'); },60);
}
function grantPrize(p){
  let body='';
  if(p.id==='c1'){const v=8000+S.shopLvl*14000;S.cash+=v;S.stats.earned+=v;body=rl('💵 Cash','+$'+fmt(v));sfx('buy');}
  else if(p.id==='c2'){const v=30000+S.shopLvl*45000;S.cash+=v;S.stats.earned+=v;body=rl('💰 Cash','+$'+fmt(v));sfx('buy');}
  else if(p.id==='g1'){S.gold+=20;body=rl('◆ Gold','+20');sfx('buy');}
  else if(p.id==='k1'){S.keys+=1;body=rl('⚿ Key','+1');sfx('buy');}
  else if(p.id==='r2'){S.gold+=120;body=rl('◆ Gold','+120');sfx('win');}
  else if(p.id==='l2'){S.gold+=600;body=rl('👑 Gold','+600');sfx('jackpot');}
  else if(p.id==='e2'){const v=220000+S.shopLvl*260000;S.cash+=v;S.stats.earned+=v;body=rl('🏆 Jackpot','+$'+fmt(v));sfx('jackpot');}
  else if(p.id==='f1'){
    const lines=grantParts(3,{e:6,r:30});
    body=lines.map(l=>rl(l+' fusion part','+1')).join('')+
      `<div class="sub" style="margin-top:8px;font-size:11px">Fit these in the ◇ slots under each upgrade in the garage.</div>`;
    sfx('win');
  }
  else if(p.id==='e1'){
    const car=activeCar();
    const eligible=UPGRADES.filter(u=>(car.upg[u.id]||0)===5);
    if(eligible.length){
      const u=pick(eligible); car.upg[u.id]=6;
      body=rl('🧬 '+u.name,'STAGE 6 ELITE')+`<div class="sub" style="margin-top:8px;font-size:11px">Installed on your ${CARS_BY_ID[car.id].name}.</div>`;
    } else {
      const lines=grantParts(2,{e:100,r:0});
      body=lines.map(l=>rl(l+' fusion part','+1')).join('')+
        `<div class="sub" style="margin-top:8px;font-size:11px">No stage-5 category to elevate, so the machine minted Epic fusion parts instead.</div>`;
    }
    sfx('win');
  }
  else if(p.id==='l1'){
    if(S.cars.some(c=>c.id==='phantom')){
      S.gold+=800; body=rl('Duplicate legend → converted','+800 ◆');
    } else {
      S.cars.push(newOwnedCar('phantom')); S.activeCar=S.cars.length-1;
      body=rl('🔮 NEW CAR','Phantom Legend')+
        `<div class="sub" style="margin-top:8px">The 1% pull. 1800 hp of myth is now parked in your garage.</div>`;
    }
    sfx('jackpot');
  }
  modal(`<h3 class="disp" style="color:${{c:'var(--ink)',r:'var(--cyan)',e:'var(--purple)',l:'var(--amber)'}[p.rar]}">${p.ic} ${p.nm}</h3>${body}
    <div class="btn-row">
      <button class="ghost" onclick="closeModal()">Done</button>
      <button class="act" onclick="spinAgain()" ${S.keys<1&&S.gold<60?'disabled':''}>Spin again</button>
    </div>`);
  renderHUD(); renderFortune(); saveGame();
}
const rl=(a,b)=>`<div class="reward-line"><span>${a}</span><b>${b}</b></div>`;

/* =====================================================================
   loop / ticker / offline / boot
===================================================================== */
let lastTick=Date.now(), fabAcc=0, orbAcc=0;
setInterval(()=>{
  const now=Date.now();
  const dt=(now-lastTick)/1000; lastTick=now;
  const inc=(mechIncome()+driverIncome())*dt;
  if(inc>0){ S.cash+=inc; S.stats.earned+=inc; }
  const dr=driverRep()*dt;
  if(dr>0) S.rep+=dr;
  if(S.equip.printer>0){
    fabAcc+=dt;
    const per=600/S.equip.printer;
    if(fabAcc>=per){fabAcc-=per; S.keys++; toast('⚙️ Parts Fabricator produced a Fortune key!','good');}
  }
  if(S.sponsors.sp5==='b'){
    orbAcc+=dt;
    if(orbAcc>=300){orbAcc-=300; S.keys++; toast('🛰️ Orbital Motorsport sent a Fortune key!','good');}
  }
  if(S.contract && now>=S.contract.ends){
    const c=CONTRACTS[S.contract.idx];
    const pay=Math.round(c.pay*(1+S.equip.paint*0.15)*sponsorMult('contract'));
    S.cash+=pay; S.rep+=c.rep; S.stats.earned+=pay;
    S.contract=null;
    sfx('win'); toast(`✅ ${c.name} finished: +$${fmt(pay)}, +${c.rep} rep`,'good');
    if(curScreen==='biz') renderBiz();
    saveGame();
  } else if(S.contract && curScreen==='biz'){
    const t=$('#contract-timer');
    if(t){ t.textContent='⏱ '+Math.ceil((S.contract.ends-now)/1000)+'s remaining';
      const barEl=t.closest('.contract').querySelector('.bar i');
      if(barEl) barEl.style.width=(100*(1-(S.contract.ends-now)/S.contract.total))+'%';
    }
  }
  renderHUD();
}, 500);
setInterval(saveGame, 15000);

function refreshTicker(){
  const bits=[
    `Reputation <b>${fmt(S.rep)}★</b>`,
    `Garage: <b>${S.cars.length}</b> car${S.cars.length>1?'s':''}`,
    `Best PP <b>${bestCarPP()}</b>`,
    `Crew: <b>${S.mechs.length}</b> mechanics, <b>${S.drivers.length}</b> drivers`,
    pick([
      'Rumor: a Phantom Legend was spotted leaving the docks…',
      'GripKing Tires: “Traction is a lifestyle.”',
      'Tier bosses pay Fortune keys — bring your best build.',
      'Perfect launch: the bright green sliver. Trust the needle.',
      'Every car likes a different PSI. The dyno knows.',
      "The Velocity Empire wasn't built in a day. It was built in quarter-miles.",
    ]),
  ];
  $('#ticker-inner').innerHTML=bits.join(' &nbsp;&nbsp;·&nbsp;&nbsp; ')+' &nbsp;&nbsp;·&nbsp;&nbsp; ';
}
setInterval(refreshTicker, 40000);

function offlineEarnings(){
  const away=(Date.now()-S.lastSeen)/1000;
  if(away<60) return;
  const capped=Math.min(away, 8*3600);
  const inc=(mechIncome()+driverIncome())*capped*0.5;
  const rep=driverRep()*capped*0.5;
  if(inc<1) return;
  S.cash+=inc; S.rep+=rep; S.stats.earned+=inc;
  modal(`<h3 class="disp">While you were away…</h3>
    <div class="sub">Your crew kept the lights on for ${capped>=3600?Math.floor(capped/3600)+'h '+Math.floor((capped%3600)/60)+'m':Math.floor(capped/60)+'m'} (offline rate: 50%).</div>
    <div class="reward-line"><span>💵 Shop & driver income</span><b>+$${fmt(inc)}</b></div>
    ${rep>=1?`<div class="reward-line"><span>★ Reputation</span><b>+${fmt(rep)}</b></div>`:''}
    <div class="btn-row"><button class="act" onclick="closeModal()">Collect</button></div>`);
}

(async function init(){
  buildEvents();
  await loadGame();
  offlineEarnings();
  refreshTicker();
  renderHUD();
  show('garage');
  window.addEventListener('keydown',e=>{
    if(!R.on) return;
    if(e.code==='Space'||e.code==='Enter'){ e.preventDefault(); $('#shift-btn').click(); }
    if(e.code==='KeyN'){ e.preventDefault(); $('#nitro-btn').click(); }
    if(e.code==='Escape'){ e.preventDefault(); R.paused? $('#pm-resume').click() : $('#race-pause').click(); }
  });
})();
</script>
</body>
</html>
